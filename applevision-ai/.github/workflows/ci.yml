# ==============================================================================
# AppleVision AI – CI/CD Pipeline
# ==============================================================================
# Runs on every push to main and on pull requests.
# Jobs: Lint → Test → Docker Build
# ==============================================================================

name: AppleVision AI CI

on:
  push:
    branches: [main, develop]
    paths:
      - "applevision-ai/**"
  pull_request:
    branches: [main]
    paths:
      - "applevision-ai/**"

defaults:
  run:
    working-directory: applevision-ai

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('applevision-ai/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install linting tools
        run: pip install flake8 flake8-docstrings isort black

      - name: Run flake8
        run: |
          flake8 app/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,D100,D104 \
            --statistics \
            --count

      - name: Check import ordering
        run: isort --check-only --diff app/

      - name: Check code formatting
        run: black --check --line-length 120 app/

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('applevision-ai/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-flask

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
          MODEL_PATH: /dev/null
          LABELS_PATH: /dev/null
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: applevision-ai/coverage.xml
          retention-days: 14

  # ── Docker Build ─────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: applevision-ai
          file: applevision-ai/Dockerfile
          push: false
          tags: applevision-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate image
        run: |
          docker build -t applevision-ai:test .
          docker run --rm applevision-ai:test python -c "from app import create_app; print('✅ App factory OK')"
